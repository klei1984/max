   Windows-x64:
      name: Windows x64
      runs-on: windows-2022

      defaults:
         run:
            shell: msys2 {0}

      steps:
      -  name: Install MSYS2
         id: msys2
         uses: msys2/setup-msys2@v2
         with:
            msystem: UCRT64
            update: false
            release: true
            cache: true

      -  name: Set build configuration
         id: build_configuration
         run: |
            BUILD_TYPE=${{github.event.inputs.build_type}}
            BUILD_TYPE=${BUILD_TYPE:-"Debug"}
            echo "build_type=${BUILD_TYPE}" >> $GITHUB_OUTPUT
            echo "preset=$(echo "${BUILD_TYPE}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      -  name: Setup Dependencies
         run: |
            pacman -S --noconfirm git mingw-w64-ucrt-x86_64-toolchain p7zip mingw-w64-ucrt-x86_64-cmake mingw-w64-ucrt-x86_64-ninja mingw-w64-ucrt-x86_64-nsis mingw-w64-ucrt-x86_64-gettext mingw-w64-ucrt-x86_64-ccache make

      -  name: Checkout
         uses: actions/checkout@v7

      -  name: Cache dependencies
         uses: actions/cache@v6
         with:
            path: dependencies
            key: ${{ runner.os }}-dependencies-${{ hashFiles('dependencies/dependencies.md5') }}
            restore-keys: |
               ${{ runner.os }}-dependencies-

      -  name: Cache ccache
         uses: actions/cache@v6
         with:
            path: ${{ runner.temp }}/.ccache
            key: ${{ runner.os }}-ccache-${{ github.job }}-${{ github.sha }}
            restore-keys: |
               ${{ runner.os }}-ccache-${{ github.job }}-

      -  name: Download dependencies
         continue-on-error: true
         run: |
            mkdir -p dependencies
            bash cmake/scripts/linux/get-dependencies cmake/versions.cmake

      -  name: Build
         env:
            MSYS2_ROOT: ${{steps.msys2.outputs.msys2-location}}
            CMAKE_C_COMPILER_LAUNCHER: ccache
            CMAKE_CXX_COMPILER_LAUNCHER: ccache
         run: |-
            export CCACHE_DIR="$(cygpath -m '${{ runner.temp }}')/.ccache"
            echo "ccache dir: $CCACHE_DIR"
            ccache --show-config 2>/dev/null | grep -i cache_dir || true
            ccache -z
            cmake --preset msys2-ucrt64-${{steps.build_configuration.outputs.preset}}
            cmake --build --preset msys2-ucrt64-${{steps.build_configuration.outputs.preset}}
            ccache -s

      -  name: Test
         run: |
            ctest --preset msys2-ucrt64-${{steps.build_configuration.outputs.preset}}

      -  name: Package
         run: |
            cd build/ucrt64-${{steps.build_configuration.outputs.preset}}
            cpack --config CPackConfig.cmake
            cpack --config CPackSourceConfig.cmake
            mkdir -p Artifacts/Windows-x64
            cp *-win64.exe Artifacts/Windows-x64/
            cp *-win64.7z Artifacts/Windows-x64/
            cp *-Source.7z Artifacts/Windows-x64/
            7z a -mx9 -bd max-port-win64-symbols.7z max.debug
            cp max-port-win64-symbols.7z Artifacts/Windows-x64/

      -  name: Upload Artifacts
         uses: actions/upload-artifact@v7
         with:
            name: ${{github.job}}
            path: build/ucrt64-${{steps.build_configuration.outputs.preset}}/Artifacts

