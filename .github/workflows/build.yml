name: Build Workflow
on:
   workflow_dispatch:
      inputs:
         build_type:
            description: 'Build Configuration to use (Debug, Release, RelWithDebInfo or MinSizeRel).'
            required: false
            default: 'Debug'

   push:
      branches:
      - master
      paths-ignore:
      - '**.md'
      - '**/doc'

   pull_request:
      types:
      - opened
      - synchronize
      - reopened
      paths-ignore:
      - '**.md'
      - '**/doc'

jobs:
   Linux-x64:
      name: Linux x64
      runs-on: ubuntu-latest
      container: ubuntu:24.04

      steps:
      -  name: Set build configuration
         id: build_configuration
         run: |
            BUILD_TYPE=${{github.event.inputs.build_type}}
            BUILD_TYPE=${BUILD_TYPE:-"Debug"}
            echo "build_type=${BUILD_TYPE}" >> $GITHUB_OUTPUT
            echo "preset=$(echo "${BUILD_TYPE}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      -  name: Cache APT packages
         uses: actions/cache@v6
         with:
            path: |
               /var/cache/apt/archives
               /var/lib/apt/lists
            key: ${{ runner.os }}-apt-${{ github.job }}-${{ hashFiles('**/.github/workflows/build.yml') }}
            restore-keys: |
               ${{ runner.os }}-apt-${{ github.job }}-
               ${{ runner.os }}-apt-

      -  name: Setup Dependencies
         run: |
            apt update -y && apt install -y sudo
            sudo apt-get update -y
            sudo apt-get install -y ca-certificates gpg wget
            test -f /usr/share/doc/kitware-archive-keyring/copyright ||
            wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc 2>/dev/null | gpg --dearmor - | sudo tee /usr/share/keyrings/kitware-archive-keyring.gpg >/dev/null
            echo 'deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] https://apt.kitware.com/ubuntu/ jammy main' | sudo tee /etc/apt/sources.list.d/kitware.list >/dev/null
            sudo apt-get update -y
            test -f /usr/share/doc/kitware-archive-keyring/copyright ||
            sudo rm /usr/share/keyrings/kitware-archive-keyring.gpg
            sudo apt-get install kitware-archive-keyring
            sudo apt install -y file build-essential cmake ninja-build ccache wget gettext p7zip-full libasound2-dev libpulse-dev libx11-dev libxext-dev libxcursor-dev libxrandr-dev libxfixes-dev libxi-dev libxss-dev libxtst-dev libxkbcommon-dev libwayland-dev wayland-protocols libdecor-0-dev libdbus-1-dev libgl-dev libegl-dev libudev-dev

      -  name: Checkout
         uses: actions/checkout@v7

      -  name: Cache dependencies
         uses: actions/cache@v6
         with:
            path: dependencies
            key: ${{ runner.os }}-dependencies-${{ hashFiles('dependencies/dependencies.md5') }}
            restore-keys: |
               ${{ runner.os }}-dependencies-

      -  name: Cache ccache
         uses: actions/cache@v6
         with:
            path: ~/.cache/ccache
            key: ${{ runner.os }}-ccache-${{ github.job }}-${{ github.sha }}
            restore-keys: |
               ${{ runner.os }}-ccache-${{ github.job }}-

      -  name: Download dependencies
         continue-on-error: true
         run: |
            mkdir -p dependencies
            bash cmake/scripts/linux/get-dependencies cmake/versions.cmake

      -  name: Build
         env:
            CMAKE_C_COMPILER_LAUNCHER: ccache
            CMAKE_CXX_COMPILER_LAUNCHER: ccache
         run: |-
            ccache -z
            cmake --preset linux-x64-${{steps.build_configuration.outputs.preset}}
            cmake --build --preset linux-x64-${{steps.build_configuration.outputs.preset}}
            ccache -s

      -  name: Test
         run: |
            ctest --preset linux-x64-${{steps.build_configuration.outputs.preset}}

      -  name: Package Source
         run: |
            cd build/linux-x64-${{steps.build_configuration.outputs.preset}}
            cpack --config CPackSourceConfig.cmake
            mkdir -p Artifacts/Linux-x64
            cp *.tar.gz Artifacts/Linux-x64/

      -  name: Upload Artifacts
         uses: actions/upload-artifact@v7
         with:
            name: ${{github.job}}
            path: build/linux-x64-${{steps.build_configuration.outputs.preset}}/Artifacts

